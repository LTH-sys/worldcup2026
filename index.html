<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Dự đoán World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0B1F2A; --pitch:#16342B; --pitch-light:#1E4538; --pitch-lighter:#27553F;
  --chalk:#F4F1EA; --chalk-dim:#B9C4BC; --gold:#D9A441; --gold-dim:#a9803a;
  --mint:#6FCF97; --coral:#E2725B; --line:rgba(244,241,234,0.14);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--ink);color:var(--chalk);font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;}
body{padding-bottom:40px;}
.mono{font-family:'Roboto Mono',monospace;}
.disp{font-family:'Teko',sans-serif;font-weight:600;letter-spacing:.02em;}
button{font-family:inherit;}
#app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

/* ---------- top bar ---------- */
.topbar{position:sticky;top:0;z-index:30;background:var(--ink);border-bottom:1px solid var(--line);padding:14px 16px 0;}
.topbar-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px;}
.brand{font-size:30px;line-height:1;color:var(--chalk);}
.brand span{color:var(--gold);}
.player-chip{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--chalk-dim);}
.player-chip b{color:var(--chalk);font-weight:600;}
.player-chip button{background:none;border:1px solid var(--line);color:var(--chalk-dim);border-radius:20px;padding:4px 10px;font-size:12px;cursor:pointer;}
.tabs{display:flex;gap:6px;margin:12px 0 10px;background:var(--pitch);border-radius:14px;padding:4px;}
.tab-btn{flex:1;border:none;background:transparent;color:var(--chalk-dim);padding:9px 0;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s,color .15s;}
.tab-btn.active{background:var(--gold);color:var(--ink);}

/* ---------- filters ---------- */
.filters{display:flex;gap:6px;overflow-x:auto;padding:10px 16px;border-bottom:1px solid var(--line);}
.chip{flex:0 0 auto;border:1px solid var(--line);background:var(--pitch);color:var(--chalk-dim);border-radius:20px;padding:6px 13px;font-size:12.5px;font-weight:500;cursor:pointer;white-space:nowrap;}
.chip.active{background:var(--mint);color:var(--ink);border-color:var(--mint);font-weight:700;}

/* ---------- content ---------- */
.content{padding:12px 14px 0;flex:1;}
.day-header{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 4px;cursor:pointer;border-top:1px solid var(--line);}
.day-header:first-child{border-top:none;}
.day-left{display:flex;align-items:baseline;gap:8px;}
.day-date{font-size:18px;color:var(--chalk);font-weight:600;}
.day-wd{font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:.04em;}
.day-count{font-size:11.5px;color:var(--chalk-dim);}
.chevron{font-size:13px;color:var(--chalk-dim);transition:transform .15s;}
.chevron.open{transform:rotate(90deg);}
.day-matches{display:flex;flex-direction:column;gap:10px;padding:2px 0 12px;}
.day-matches.collapsed{display:none;}

/* ---------- ticket card ---------- */
.ticket{position:relative;background:var(--pitch-light);border-radius:14px;overflow:hidden;border:1px solid rgba(244,241,234,.06);}
.ticket-top{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;gap:8px;}
.t-time{font-size:17px;font-weight:700;color:var(--chalk);}
.t-tags{display:flex;gap:6px;align-items:center;}
.tag{font-size:10.5px;padding:2px 8px;border-radius:10px;background:rgba(244,241,234,.08);color:var(--chalk-dim);font-weight:600;}
.tag.gold{background:rgba(217,164,65,.18);color:var(--gold);}
.t-venue{font-size:10.5px;color:var(--chalk-dim);max-width:130px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.matchup{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:4px 14px 14px;gap:6px;}
.team{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;}
.team.right{align-items:center;}
.badge{width:42px;height:42px;border-radius:50%;background:var(--ink);border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--chalk);}
.team-name{font-size:11.5px;color:var(--chalk-dim);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vs{font-family:'Teko',sans-serif;font-size:16px;color:var(--gold-dim);font-weight:600;}

.perforation{position:relative;height:1px;background:repeating-linear-gradient(90deg,var(--line) 0 6px,transparent 6px 12px);margin:0 0;}
.perforation::before,.perforation::after{content:"";position:absolute;top:-7px;width:14px;height:14px;border-radius:50%;background:var(--ink);}
.perforation::before{left:-7px;}
.perforation::after{right:-7px;}

.dyn{padding:13px 14px 14px;}
.pick-row{display:grid;grid-template-columns:1fr 64px 1fr;gap:6px;}
.pick-btn{border:1.5px solid var(--line);background:rgba(244,241,234,.03);color:var(--chalk);border-radius:10px;padding:8px 4px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;line-height:1.25;transition:background .12s,border-color .12s,color .12s;}
.pick-btn .code{display:block;font-family:'Teko',sans-serif;font-size:16px;}
.pick-btn:disabled{opacity:.35;cursor:not-allowed;}
.pick-btn.selected{background:var(--gold);border-color:var(--gold);color:var(--ink);}
.pick-btn.draw.selected{background:var(--chalk-dim);border-color:var(--chalk-dim);}
.placeholder-note{font-size:11px;color:var(--chalk-dim);text-align:center;padding:6px 0 0;}

.avatars{display:flex;gap:5px;flex-wrap:wrap;margin-top:11px;}
.avt{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:1.5px solid var(--line);color:var(--chalk-dim);background:transparent;}
.avt.picked{background:rgba(244,241,234,.10);color:var(--chalk);border-color:rgba(244,241,234,.3);}
.avt.correct{background:var(--mint);color:var(--ink);border-color:var(--mint);}
.avt.wrong{background:transparent;color:var(--coral);border-color:var(--coral);}

/* ---------- avatar picker ---------- */
.avatar-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:12px 0;}
.avatar-opt{width:42px;height:42px;border-radius:50%;border:2px solid var(--line);background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:border-color .12s,transform .12s;}
.avatar-opt:active{transform:scale(1.15);}
.avatar-opt.selected{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-dim);}
.player-chip .avt-chip{font-size:20px;cursor:pointer;}

.result-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);}
.result-banner{font-size:12px;font-weight:700;color:var(--gold);}
.result-link{font-size:11px;color:var(--chalk-dim);background:none;border:none;text-decoration:underline;cursor:pointer;padding:0;}
.result-edit{display:grid;grid-template-columns:1fr 64px 1fr;gap:6px;margin-top:10px;}
.result-edit .pick-btn{border-color:var(--coral);}
.result-edit .pick-btn.selected{background:var(--coral);border-color:var(--coral);color:#fff;}
.confirm-btn{width:100%;margin-top:8px;background:var(--coral);color:#fff;border:none;border-radius:10px;padding:10px;font-size:12.5px;font-weight:700;cursor:pointer;}
.confirm-btn:disabled{opacity:.35;cursor:not-allowed;}
.locked-badge{font-size:11px;color:var(--mint);font-weight:600;}

.note{font-size:11px;color:var(--gold);margin-top:8px;font-style:italic;}

/* ---------- login ---------- */
.login-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:30px 22px;}
.login-title{font-size:34px;text-align:center;margin-bottom:4px;}
.login-sub{text-align:center;color:var(--chalk-dim);font-size:13px;margin-bottom:24px;}
.login-sub code{background:rgba(244,241,234,.1);color:var(--gold);padding:2px 6px;border-radius:5px;font-family:'Roboto Mono',monospace;font-size:12px;}
.login-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.login-btn{display:flex;align-items:center;gap:10px;background:var(--pitch-light);border:1.5px solid var(--line);border-radius:14px;padding:14px 12px;color:var(--chalk);font-size:15px;font-weight:600;cursor:pointer;}
.login-btn .badge{background:var(--ink);}
.login-btn:active{border-color:var(--gold);}
.add-player-btn{width:100%;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px;background:transparent;border:1.5px dashed var(--gold-dim);border-radius:14px;padding:13px;color:var(--gold);font-size:14px;font-weight:600;cursor:pointer;}
.add-player-btn .plus{font-size:18px;line-height:1;}

/* ---------- auth modal ---------- */
.modal-backdrop{position:fixed;inset:0;background:rgba(11,31,42,.82);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal-card{position:relative;width:100%;max-width:340px;background:var(--pitch-light);border:1px solid var(--line);border-radius:16px;padding:24px 20px 20px;}
.modal-close{position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:50%;border:none;background:rgba(244,241,234,.08);color:var(--chalk-dim);font-size:13px;cursor:pointer;}
.modal-title{font-size:20px;font-weight:600;color:var(--chalk);margin-bottom:4px;}
.modal-sub{font-size:12.5px;color:var(--chalk-dim);margin-bottom:14px;}
.auth-input{width:100%;background:var(--ink);border:1.5px solid var(--line);border-radius:10px;padding:11px 12px;color:var(--chalk);font-size:14px;margin-bottom:10px;}
.auth-input:focus{outline:none;border-color:var(--gold);}
.auth-error{color:var(--coral);font-size:12px;margin:-2px 0 10px;}
.auth-hint{color:var(--mint);font-size:12px;margin:-2px 0 10px;}
.auth-submit{width:100%;background:var(--gold);color:var(--ink);border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;}
.lb-add-row{display:flex;justify-content:flex-end;margin-bottom:6px;}
.lb-add-btn{background:none;border:1px solid var(--line);color:var(--gold);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;}

/* ---------- admin ---------- */
.admin-btn{background:none;border:1px solid var(--line);color:var(--chalk-dim);border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer;}
.admin-panel{padding:14px;background:var(--pitch-light);border-radius:14px;margin:14px;border:1px solid rgba(226,114,91,.3);}
.admin-panel .admin-title{font-size:14px;font-weight:700;color:var(--coral);margin-bottom:10px;}
.admin-panel .admin-desc{font-size:12px;color:var(--chalk-dim);margin-bottom:8px;}
.admin-reset-btn{width:100%;background:var(--coral);color:#fff;border:none;border-radius:10px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px;}
.admin-reset-btn:last-child{margin-bottom:0;}
.admin-confirm-box{background:var(--ink);border:1px solid var(--coral);border-radius:10px;padding:12px;margin-top:8px;}
.admin-confirm-box p{font-size:12px;color:var(--coral);margin:0 0 8px;}
.admin-confirm-box .admin-cf-btns{display:flex;gap:8px;}
.admin-confirm-box button{flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;}
.admin-confirm-box .cf-yes{background:var(--coral);color:#fff;}
.admin-confirm-box .cf-no{background:rgba(244,241,234,.1);color:var(--chalk);}

/* admin manual entry */
.admin-entry-btn{width:100%;background:var(--pitch);border:1.5px solid var(--gold);color:var(--gold);border-radius:10px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px;}
.admin-match-list{display:flex;flex-direction:column;gap:8px;margin-top:10px;max-height:60vh;overflow-y:auto;}
.admin-match-item{background:var(--ink);border:1px solid var(--line);border-radius:10px;padding:10px 12px;}
.admin-match-item .ami-teams{font-size:13px;font-weight:600;margin-bottom:6px;}
.admin-match-item .ami-meta{font-size:11px;color:var(--chalk-dim);margin-bottom:8px;}
.ami-score-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
.ami-score-input{width:44px;background:var(--pitch-light);border:1.5px solid var(--line);border-radius:7px;padding:6px 4px;color:var(--chalk);font-size:16px;font-weight:700;text-align:center;}
.ami-score-input:focus{outline:none;border-color:var(--gold);}
.ami-sep{font-size:16px;color:var(--chalk-dim);}
.ami-save-btn{flex:1;background:var(--gold);color:var(--ink);border:none;border-radius:7px;padding:7px;font-size:12px;font-weight:700;cursor:pointer;}
.ami-saved{font-size:11px;color:var(--mint);font-weight:600;}

/* admin prediction editor */
.admin-pred-player{margin-bottom:10px;}
.admin-pred-player-name{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.admin-pred-match-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--line);}
.admin-pred-match-row:last-child{border-bottom:none;}
.admin-pred-teams{flex:1;font-size:11.5px;color:var(--chalk-dim);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.admin-pred-select{background:var(--pitch-light);border:1.5px solid var(--line);border-radius:7px;color:var(--chalk);font-size:11px;padding:4px 6px;cursor:pointer;}
.admin-pred-select:focus{outline:none;border-color:var(--gold);}
.admin-pred-del{background:none;border:none;color:var(--coral);font-size:14px;cursor:pointer;padding:2px 4px;flex:0 0 auto;}
.admin-pred-save{background:var(--gold);color:var(--ink);border:none;border-radius:7px;padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer;}

/* ---------- leaderboard ---------- */
.lb-wrap{padding:14px;}
.lb-head{font-size:13px;color:var(--chalk-dim);margin-bottom:14px;}
.lb-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);}
.lb-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Teko',sans-serif;font-weight:700;font-size:15px;background:rgba(244,241,234,.08);color:var(--chalk-dim);flex:0 0 auto;}
.lb-rank.gold{background:var(--gold);color:var(--ink);}
.lb-rank.silver{background:#C9CDD3;color:var(--ink);}
.lb-rank.bronze{background:#C98A56;color:var(--ink);}
.lb-mid{flex:1;min-width:0;}
.lb-name{font-size:15px;font-weight:600;margin-bottom:5px;}
.lb-bar-track{height:6px;background:rgba(244,241,234,.08);border-radius:4px;overflow:hidden;}
.lb-bar-fill{height:100%;background:var(--gold);}
.lb-stats{flex:0 0 auto;text-align:right;font-family:'Roboto Mono',monospace;}
.lb-stats .big{font-size:16px;font-weight:700;color:var(--gold);}
.lb-stats .small{font-size:10.5px;color:var(--chalk-dim);}
.lb-bananas{font-size:12px;letter-spacing:-1px;line-height:1.3;margin-top:3px;word-break:break-all;}
.banana-pot{text-align:center;padding:16px 12px;margin-bottom:14px;background:var(--pitch-light);border-radius:14px;border:1px solid var(--line);}
.banana-pot .pot-num{font-family:'Teko',sans-serif;font-size:42px;font-weight:700;color:var(--gold);line-height:1;}
.banana-pot .pot-label{font-size:12px;color:var(--chalk-dim);margin-top:2px;}
.banana-pot .pot-emoji{font-size:28px;margin-bottom:4px;}

/* honour cards */
.honour-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.honour-card{background:var(--pitch-light);border-radius:14px;padding:14px 10px;text-align:center;border:1px solid var(--line);}
.honour-card.banana{border-color:rgba(217,164,65,.4);}
.honour-card.prophet{border-color:rgba(111,207,151,.4);}
.honour-card .hc-icon{font-size:28px;margin-bottom:4px;line-height:1;}
.honour-card .hc-title{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--chalk-dim);margin-bottom:6px;}
.honour-card .hc-name{font-size:15px;font-weight:700;color:var(--chalk);line-height:1.2;}
.honour-card .hc-badge{display:inline-block;margin-top:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.honour-card.banana .hc-badge{background:rgba(217,164,65,.2);color:var(--gold);}
.honour-card.prophet .hc-badge{background:rgba(111,207,151,.2);color:var(--mint);}
.honour-card .hc-stat{font-size:11px;color:var(--chalk-dim);margin-top:4px;}

/* ---------- player history ---------- */
.hist-modal{position:fixed;inset:0;z-index:50;background:var(--ink);display:flex;flex-direction:column;}
.hist-header{position:sticky;top:0;background:var(--ink);border-bottom:1px solid var(--line);padding:14px 16px;display:flex;align-items:center;gap:12px;}
.hist-back{background:none;border:1px solid var(--line);color:var(--chalk);border-radius:20px;padding:5px 12px;font-size:13px;cursor:pointer;}
.hist-title{font-size:18px;font-weight:700;}
.hist-summary{display:flex;gap:10px;padding:14px 16px;background:var(--pitch-light);}
.hist-stat{flex:1;text-align:center;}
.hist-stat .hs-num{font-family:'Teko',sans-serif;font-size:28px;font-weight:700;line-height:1;}
.hist-stat .hs-lbl{font-size:10.5px;color:var(--chalk-dim);}
.hist-body{flex:1;overflow-y:auto;padding:10px 14px 30px;}
.hist-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
.hist-item:last-child{border-bottom:none;}
.hist-result-dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;}
.hist-result-dot.correct{background:var(--mint);}
.hist-result-dot.wrong{background:var(--coral);}
.hist-result-dot.pending{background:var(--chalk-dim);}
.hist-match{flex:1;min-width:0;}
.hist-match .hm-teams{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hist-match .hm-meta{font-size:11px;color:var(--chalk-dim);margin-top:2px;}
.hist-pick{text-align:right;font-size:12px;font-weight:600;flex:0 0 auto;}
.hist-pick.correct{color:var(--mint);}
.hist-pick.wrong{color:var(--coral);}
.hist-pick.pending{color:var(--chalk-dim);}

.loading{flex:1;display:flex;align-items:center;justify-content:center;color:var(--chalk-dim);font-size:13px;}
.empty-state{text-align:center;color:var(--chalk-dim);font-size:13px;padding:40px 20px;}

@media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>

const DEFAULT_PLAYERS = ["Tùng", "Hữu", "Hùng", "Dương", "Đạt", "Thông", "Sang", "Thành"];

async function hashPassword(pw){
  const str = String(pw);
  try{
    const enc = new TextEncoder().encode(str);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){
    // fallback simple hash if Web Crypto is unavailable in this environment
    let h1 = 0xdeadbeef, h2 = 0x41c6ce57;
    for (let i=0;i<str.length;i++){
      const ch = str.charCodeAt(i);
      h1 = Math.imul(h1 ^ ch, 2654435761);
      h2 = Math.imul(h2 ^ ch, 1597334677);
    }
    h1 = (h1 ^ (h1>>>16)) >>> 0; h2 = (h2 ^ (h2>>>16)) >>> 0;
    return h1.toString(16) + h2.toString(16);
  }
}

// ====== CẤU HÌNH FIREBASE — DÁN LINK REALTIME DATABASE CỦA BẠN VÀO DÒNG DƯỚI ======
// Ví dụ: "https://wc2026-dudoan-default-rtdb.asia-southeast1.firebasedatabase.app"
const FIREBASE_DB_URL = "https://wc2026-vuive-default-rtdb.asia-southeast1.firebasedatabase.app/";
const DB_PATH = "worldcup2026";
// ===================================================================================

function firebaseConfigured(){
  return FIREBASE_DB_URL && FIREBASE_DB_URL.indexOf("FIREBASE_DATABASE_URL_HERE") === -1;
}

async function fbGet(key){
  try{
    const url = `${FIREBASE_DB_URL.replace(/\/$/,'')}/${DB_PATH}/${key}.json`;
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP "+res.status);
    return await res.json();
  }catch(e){ console.error("fbGet failed:", key, e); return null; }
}
async function fbSet(key, value){
  try{
    const url = `${FIREBASE_DB_URL.replace(/\/$/,'')}/${DB_PATH}/${key}.json`;
    const res = await fetch(url, { method:"PUT", headers:{"Content-Type":"application/json"}, body: JSON.stringify(value) });
    if (!res.ok) throw new Error("HTTP "+res.status);
    return true;
  }catch(e){ console.error("fbSet failed:", key, e); return false; }
}

async function init(){
  if (!firebaseConfigured()){
    state.loaded = true;
    state.configError = true;
    render();
    return;
  }
  const [pred, res, scoresRaw, playersRaw, authRaw, lockedRaw, avatarsRaw] = await Promise.all([
    fbGet('predictions'), fbGet('results'), fbGet('scores'), fbGet('players'), fbGet('playerAuth'), fbGet('predictionsLocked'), fbGet('playerAvatars')
  ]);
  state.predictions = pred || {};
  state.results = res || {};
  state.scores = scoresRaw || {};
  state.predictionsLocked = lockedRaw || {};
  state.playerAvatars = avatarsRaw || {};
  state.currentPlayer = localStorage.getItem('currentPlayer') || null;
  if (playersRaw){
    state.players = playersRaw;
  } else {
    state.players = DEFAULT_PLAYERS.slice();
    await fbSet('players', state.players);
  }
  state.playerAuth = authRaw || {};
  state.loaded = true;
  const todayStr = vnToday();
  const upcomingDay = MATCHES.find(m=>m.date>=todayStr);
  if (upcomingDay) state.openDays.add(upcomingDay.date);
  render();
}

function vnToday(){
  try{ return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Ho_Chi_Minh'}); }
  catch(e){ return new Date().toISOString().slice(0,10); }
}

function getActualResult(m){
  return state.results[m.id] || m.preset || null;
}

function loginAs(name){
  state.currentPlayer = name;
  try{ localStorage.setItem('currentPlayer', name); }catch(e){}
  if (!state.playerAvatars[name]){
    state.authModal = {mode:'avatar'};
  }
  render();
}
function logout(){
  state.currentPlayer = null;
  try{ localStorage.removeItem('currentPlayer'); }catch(e){}
  render();
}

  state.authModal = null;
  render();
}

async function doLogin(name, password){
  if (!password){ state.authError = 'Vui lòng nhập mật khẩu.'; render(); return; }
  const latest = await fbGet('playerAuth');
  state.playerAuth = latest || {};
  const hash = await hashPassword(password);
  if (!state.playerAuth[name]){
    state.playerAuth[name] = hash;
    await fbSet('playerAuth', state.playerAuth);
    state.authModal = null; state.authError = '';
    loginAs(name);
    return;
  }
  if (state.playerAuth[name] === hash){
    state.authModal = null; state.authError = '';
    loginAs(name);
    return;
  }
  state.authError = 'Sai mật khẩu, thử lại.';
  render();
}
function onLoginSubmit(){
  const pw = document.getElementById('auth-pw').value;
  doLogin(state.authModal.name, pw);
}

async function doCreate(name, pw, pw2){
  name = (name||'').trim();
  if (!name){ state.authError = 'Vui lòng nhập tên của bạn.'; render(); return; }
  if (pw.length < 4){ state.authError = 'Mật khẩu cần ít nhất 4 ký tự.'; render(); return; }
  if (pw !== pw2){ state.authError = 'Hai mật khẩu không khớp.'; render(); return; }
  const latestPlayers = await fbGet('players');
  state.players = latestPlayers || state.players;
  if (state.players.some(p=>p.toLowerCase()===name.toLowerCase())){
    state.authError = 'Tên này đã có trong danh sách — hãy đăng nhập vào tên đó thay vì tạo mới.';
    render(); return;
  }
  state.players.push(name);
  await fbSet('players', state.players);
  const latestAuth = await fbGet('playerAuth');
  state.playerAuth = latestAuth || {};
  state.playerAuth[name] = await hashPassword(pw);
  await fbSet('playerAuth', state.playerAuth);
  const shouldLogin = !state.currentPlayer;
  state.authModal = null; state.authError = '';
  if (shouldLogin){ loginAs(name); }
  else { render(); }
}
function onCreateSubmit(){
  const name = document.getElementById('auth-name').value;
  const pw = document.getElementById('auth-pw').value;
  const pw2 = document.getElementById('auth-pw2').value;
  doCreate(name, pw, pw2);
}

  const m = state.authModal;
  let body = '';
  if (m.mode === 'login'){
    const known = !!state.playerAuth[m.name];

        ? `<div class="modal-sub">Nhập mật khẩu để đăng nhập</div>`

      <input type="password" id="auth-pw" class="auth-input" placeholder="Mật khẩu" autofocus>
      ${state.authError ? `<div class="auth-error">${state.authError}</div>` : ''}
      <button class="auth-submit" onclick="onLoginSubmit()">${known ? 'Đăng nhập' : 'Tạo mật khẩu & đăng nhập'}</button>`;

async function doAdminLogin(pin){
  if (!pin || pin.length < 4){ state.authError = 'PIN cần ít nhất 4 ký tự.'; render(); return; }
  const latest = await fbGet('adminPin');
  const hash = await hashPassword(pin);
  if (!latest){
    await fbSet('adminPin', hash);
    state.isAdmin = true;
    state.authModal = null; state.authError = '';
    render(); return;
  }
  if (latest === hash){
    state.isAdmin = true;
    state.authModal = null; state.authError = '';
    render(); return;
  }
  state.authError = 'Sai mã PIN admin.';
  render();
}

async function adminSavePred(playerName, matchId){
  const sel = document.getElementById(`apred-${playerName}-${matchId}`);
  if (!sel) return;
  const val = sel.value;
  const [latestPred, latestLocked] = await Promise.all([fbGet('predictions'), fbGet('predictionsLocked')]);
  state.predictions = latestPred || {};
  state.predictionsLocked = latestLocked || {};
  if (!state.predictions[matchId]) state.predictions[matchId] = {};
  if (val === '__delete__'){
    delete state.predictions[matchId][playerName];
    delete state.predictionsLocked[`${matchId}_${playerName}`];
  } else {
    state.predictions[matchId][playerName] = val;
    // unlock so player can change if needed, or keep locked — keep locked to preserve state
    state.predictionsLocked[`${matchId}_${playerName}`] = true;
  }
  await Promise.all([fbSet('predictions', state.predictions), fbSet('predictionsLocked', state.predictionsLocked)]);
  state.adminSaved = state.adminSaved || {};
  state.adminSaved[`pred_${playerName}_${matchId}`] = true;
  render();
}

async function saveManualScore(matchId){
  const m = MATCHES.find(x=>x.id===matchId);
  const h = parseInt(document.getElementById(`ami-h-${matchId}`).value);
  const a = parseInt(document.getElementById(`ami-a-${matchId}`).value);
  if (isNaN(h) || isNaN(a) || h < 0 || a < 0){ alert('Tỷ số không hợp lệ'); return; }
  const scoreStr = `${h} - ${a}`;
  let outcome;
  if (h > a) outcome = 'team1';
  else if (a > h) outcome = 'team2';
  else outcome = 'draw';
  const [latestResults, latestScores] = await Promise.all([fbGet('results'), fbGet('scores')]);
  state.results = latestResults || {};
  state.scores = latestScores || {};
  state.results[matchId] = outcome;
  state.scores[matchId] = scoreStr;
  await Promise.all([fbSet('results', state.results), fbSet('scores', state.scores)]);
  state.adminSaved = state.adminSaved || {};
  state.adminSaved[matchId] = true;
  render();
}

async function doReset(type){
  if (type === 'predictions'){
    await Promise.all([fbSet('predictions',{}), fbSet('predictionsLocked',{})]);
    state.predictions = {}; state.predictionsLocked = {};
  } else if (type === 'results'){
    await Promise.all([fbSet('results',{}), fbSet('scores',{})]);
    state.results = {}; state.scores = {};
  } else if (type === 'all'){
    await Promise.all([fbSet('predictions',{}), fbSet('predictionsLocked',{}), fbSet('results',{}), fbSet('scores',{})]);
    state.predictions = {}; state.predictionsLocked = {}; state.results = {}; state.scores = {};
  }
  state.adminConfirm = null;
  render();
}

function renderPlayerHistory(){
  const name = state.viewingPlayer;
  const CHUOI_PER_LOSS = 20;
  let correct=0, wrong=0, total=0;
  const items = MATCHES.map(m=>{
    const pick = (state.predictions[m.id]||{})[name];
    if (!pick) return null;
    const actual = getActualResult(m);

    let status = 'pending';
    if (actual){ status = pick===actual ? 'correct' : 'wrong'; }

    if (status==='wrong') wrong++;
    total++;
    const pickLabel = pick==='draw' ? 'Hòa' : (pick==='team1'? m.team1 : m.team2);
    return {m, pick, pickLabel, actual, score, status};
  }).filter(Boolean);

  return `<div class="hist-modal">
    <div class="hist-header">

      <div class="hist-stat"><div class="hs-num" style="color:var(--gold)">${wrong*CHUOI_PER_LOSS} 🍌</div><div class="hs-lbl">Chuối nợ</div></div>
      <div class="hist-stat"><div class="hs-num">${total}</div><div class="hs-lbl">Đã dự đoán</div></div>
    </div>
    <div class="hist-body">
      ${items.length===0 ? '<div class="empty-state">Chưa có dự đoán nào.</div>' :
        items.map(({m,pickLabel,score,status})=>{
          const scoreStr = score ? ` (${score})` : '';
          const actualLabel = getActualResult(m)==='draw'?'Hòa':getActualResult(m)==='team1'?m.team1:m.team2;
          return `<div class="hist-item">

async function confirmPrediction(matchId){
  if (!state.currentPlayer) return;
  const pick = state.pendingPrediction[matchId];
  if (!pick) return;
  const [latestPred, latestLocked] = await Promise.all([fbGet('predictions'), fbGet('predictionsLocked')]);
  state.predictions = latestPred || {};
  state.predictionsLocked = latestLocked || {};
  state.predictions[matchId] = state.predictions[matchId] || {};
  state.predictions[matchId][state.currentPlayer] = pick;
  const lockKey = matchId + '_' + state.currentPlayer;
  state.predictionsLocked[lockKey] = true;
  delete state.pendingPrediction[matchId];
  await Promise.all([fbSet('predictions', state.predictions), fbSet('predictionsLocked', state.predictionsLocked)]);
  renderDyn(matchId);
}

function isMyPredictionLocked(matchId){
  if (!state.currentPlayer) return false;

function filteredMatches(){
  const today = vnToday();
  if (state.filter==='today') return MATCHES.filter(m=>m.date===today);
  if (state.filter==='upcoming') return MATCHES.filter(m=> !getActualResult(m) || m.date>=today);
  if (state.filter==='done') return MATCHES.filter(m=> !!getActualResult(m) && m.date<today);
  return MATCHES;
}

function groupByDay(matches){
  const groups = [];
  let cur = null;
  matches.forEach(m=>{
    if (!cur || cur.date!==m.date){ cur = {date:m.date, weekday:m.weekday, items:[]}; groups.push(cur); }
    cur.items.push(m);
  });
  return groups;
}

function renderDynHTML(m){
  const myPick = state.currentPlayer ? (state.predictions[m.id]||{})[state.currentPlayer] : null;
  const myLocked = isMyPredictionLocked(m.id);
  const pending = state.pendingPrediction[m.id];
  const actual = getActualResult(m);
  let html = '';

  // --- prediction section ---
  if (!state.currentPlayer){
    html += `<div class="placeholder-note">Đăng nhập để chọn dự đoán của bạn</div>`;
  } else if (myLocked){
    const lockLabel = myPick==='draw' ? 'Hòa' : (myPick==='team1'? m.team1 : m.team2);
    html += `<div class="placeholder-note" style="color:var(--mint);">🔒 Bạn đã chọn: <b>${lockLabel}</b></div>`;
  } else {
    const selFn = `__onsel_${m.id}`;
    window[selFn] = (v)=>selectPendingPrediction(m.id, v);
    const confirmFn = `__onconfirmpred_${m.id}`;
    window[confirmFn] = ()=>confirmPrediction(m.id);
    const showPick = pending || myPick;
    html += pickButtons(m, showPick, selFn, 'pick-row');
    if (showPick){
      html += `<button class="confirm-btn" style="background:var(--gold);color:var(--ink);" onclick="${confirmFn}()">🔒 Xác nhận dự đoán (không thể đổi sau khi xác nhận)</button>`;
    }
  }

  // --- avatars row ---
  const picks = state.predictions[m.id] || {};
  html += `<div class="avatars">` + state.players.map(p=>{
    const pk = picks[p];
    let cls = 'avt';
    if (pk){
      cls += ' picked';
      if (actual){ cls += (pk===actual? ' correct':' wrong'); }
    }
    return `<div class="${cls}" title="${p}${pk? (': '+(pk==='draw'?'Hòa':(pk==='team1'?m.team1:m.team2))):''}">${getAvatar(p)}</div>`;
  }).join('') + `</div>`;

  // --- result row (read-only, auto-updated) ---
  if (actual){
    const label = actual==='draw' ? 'Hòa' : (actual==='team1'? m.team1 : m.team2);
    const score = state.scores[m.id] || m.score;
    html += `<div class="result-row"><div class="result-banner">KẾT QUẢ: ${m.team1} ${score || '?'} ${m.team2}</div></div>`;
  } else {
    html += `<div class="result-row"><div class="result-banner" style="color:var(--chalk-dim);font-weight:500;">Chưa có kết quả</div></div>`;
  }

  if (m.note) html += `<div class="note">★ ${m.note}</div>`;
  return html;
}

function computeStats(){
  const CHUOI_PER_LOSS = 20;
  const stats = {}; state.players.forEach(p=>stats[p]={wrong:0,correct:0,total:0});
  MATCHES.forEach(m=>{
    const actual = getActualResult(m);
    if (!actual) return;
    const picks = state.predictions[m.id] || {};
    state.players.forEach(p=>{
      if (picks[p]){
        stats[p].total++;
        if (picks[p]===actual) stats[p].correct++;
        else stats[p].wrong++;
      }
    });
  });
  const maxWrong = Math.max(1, ...state.players.map(p=>stats[p].wrong));
  return state.players.map(p=>{
    const s = stats[p];
    return {name:p, ...s, chuoi: s.wrong * CHUOI_PER_LOSS, bar: Math.round(s.wrong/maxWrong*100)};
  }).sort((a,b)=> b.chuoi-a.chuoi || a.correct-b.correct);
}

function renderLeaderboardTab(){
  if (state.viewingPlayer) return renderPlayerHistory();
  const rows = computeStats();
  const totalChuoi = rows.reduce((s,r)=>s+r.chuoi, 0);

  // Chuối Vương: tất cả người có wrong cao nhất (có thể nhiều người bằng nhau)
  const withPicks = rows.filter(r=>r.total>0);
  const maxWrong = withPicks.length ? withPicks[0].wrong : 0;
  const chuoiVuongs = maxWrong > 0 ? withPicks.filter(r=>r.wrong===maxWrong) : [];

  // Nhà Tiên Tri: tất cả người có correct cao nhất (có thể nhiều người bằng nhau)
  const prophetRows = [...rows].sort((a,b)=>b.correct-a.correct || b.total-a.total);
  const maxCorrect = prophetRows.length ? prophetRows[0].correct : 0;
  const prophets = maxCorrect > 0 ? prophetRows.filter(r=>r.correct===maxCorrect) : [];

  function renderNames(list, clickable){
    return list.map(r=>`<div class="hc-name" ${clickable?`onclick="event.stopPropagation();viewPlayer('${r.name}')" style="cursor:pointer;"`:''}>
      ${getAvatar(r.name)} ${r.name}
    </div>`).join('');
  }

  const honourCards = `<div class="honour-cards">
    <div class="honour-card banana">
      <div class="hc-icon">🍌👑</div>
      <div class="hc-title">Chuối Vương${chuoiVuongs.length>1?' (đồng hạng)':''}</div>
      ${chuoiVuongs.length
        ? `${renderNames(chuoiVuongs, true)}
           <div class="hc-badge">🍌 ${maxWrong*20} chuối</div>
           <div class="hc-stat">${maxWrong} trận đoán sai</div>`
        : `<div class="hc-name" style="color:var(--chalk-dim);font-size:12px;">Chưa có dữ liệu</div>`}
    </div>
    <div class="honour-card prophet">
      <div class="hc-icon">🔮🧙</div>
      <div class="hc-title">Nhà Tiên Tri${prophets.length>1?' (đồng hạng)':''}</div>
      ${prophets.length
        ? `${renderNames(prophets, true)}
           <div class="hc-badge">✨ ${maxCorrect} trận đúng</div>
           <div class="hc-stat">${prophets[0].total>0?Math.round(maxCorrect/prophets[0].total*100):0}% chính xác</div>`
        : `<div class="hc-name" style="color:var(--chalk-dim);font-size:12px;">Chưa có dữ liệu</div>`}
    </div>
  </div>`;

  return `<div class="lb-wrap">
    <div class="lb-add-row"><button class="lb-add-btn" onclick="openCreateModal()">+ Thêm người chơi</button></div>
    <div class="banana-pot">
      <div class="pot-emoji">🍌🏆🍌</div>
      <div class="pot-num">${totalChuoi} chuối</div>
      <div class="pot-label">Tổng quỹ chuối của cả nhóm</div>
    </div>
    ${honourCards}
    <div class="lb-head">Mỗi trận đoán sai = 20 chuối đóng góp vào quỹ · Bấm vào tên để xem lịch sử</div>
    ${rows.map((r,i)=>{
      const isChuoiVuong = chuoiVuongs.some(x=>x.name===r.name);
      const isProphet = prophets.some(x=>x.name===r.name);
      const badges = [isChuoiVuong?'🍌👑 Chuối Vương':'', isProphet?'🔮🧙 Nhà Tiên Tri':''].filter(Boolean).join(' · ');
      const bananaIcons = '🍌'.repeat(Math.min(r.wrong, 30));
      return `<div class="lb-row" onclick="viewPlayer('${r.name}')" style="cursor:pointer;">
      <div class="lb-rank">${i+1}</div>
      <div class="lb-mid">
        <div class="lb-name">${getAvatar(r.name)} ${r.name}${badges?` <span style="font-size:11px;color:var(--gold);">${badges}</span>`:''}
        </div>
        <div class="lb-bar-track"><div class="lb-bar-fill" style="width:${r.bar}%"></div></div>
        ${r.wrong>0?`<div class="lb-bananas">${bananaIcons}</div>`:''}
      </div>
      <div class="lb-stats">
        <div class="big">${r.chuoi} 🍌</div>
        <div class="small">${r.wrong} sai / ${r.total} trận</div>
        <div class="small">${r.correct} đúng</div>
      </div>
    </div>`;}).join('')}
  </div>`;
}

function renderLogin(){
  return `<div class="login-wrap">
    <div class="login-title disp">Bạn là <span style="color:var(--gold);">ai</span> trong hội?</div>
    <div class="login-sub">Chọn tên rồi nhập mật khẩu để bắt đầu dự đoán World Cup 2026</div>
    <div class="login-grid">
      ${state.players.map(p=>`<button class="login-btn" onclick="openLoginModal('${p}')"><span class="badge">${getAvatar(p)}</span>${p}</button>`).join('')}
    </div>
    <button class="add-player-btn" onclick="openCreateModal()"><span class="plus">+</span>Thêm người chơi mới</button>
  </div>`;
}

function render(){
  const app = document.getElementById('app');
  if (!state.loaded){
    app.innerHTML = `<div class="loading">Đang tải dữ liệu…</div>`;
    return;
  }
  if (state.configError){
    app.innerHTML = `<div class="login-wrap">
      <div class="login-title disp">Chưa cấu hình <span style="color:var(--gold);">Firebase</span></div>
      <div class="login-sub">Mở file HTML này bằng trình soạn thảo, tìm dòng <code>FIREBASE_DB_URL</code> ở gần đầu phần &lt;script&gt;, dán link Realtime Database của bạn vào đó (thay cho "FIREBASE_DATABASE_URL_HERE"), lưu lại rồi tải lại trang.</div>
    </div>`;
    return;
  }
  if (!state.currentPlayer){
    app.innerHTML = `<div class="topbar"><div class="topbar-row"><div class="brand disp">Dự đoán <span>World Cup</span> 2026</div></div></div>` + renderLogin() + renderAuthModal();
    return;
  }
  const scrollY = window.scrollY;
  app.innerHTML = `
    <div class="topbar">
      <div class="topbar-row">
        <div class="brand disp">Dự đoán <span>World Cup</span> 2026</div>
        <div class="player-chip"><span class="avt-chip" onclick="openAvatarPicker()" title="Đổi avatar">${getAvatar(state.currentPlayer)}</span><span>Xin chào, <b>${state.currentPlayer}</b></span><button onclick="logout()">Đổi</button><button class="admin-btn" onclick="openAdminModal()">⚙️</button></div>
      </div>
      <div class="tabs">
        <button class="tab-btn ${state.tab==='matches'?'active':''}" onclick="setTab('matches')">Trận đấu</button>
        <button class="tab-btn ${state.tab==='leaderboard'?'active':''}" onclick="setTab('leaderboard')">Bảng xếp hạng</button>
      </div>
    </div>
    ${state.tab==='matches' ? `<div class="filters">
      ${[['upcoming','Sắp tới'],['today','Hôm nay'],['done','Đã đấu xong'],['all','Tất cả']].map(([k,l])=>`<button class="chip ${state.filter===k?'active':''}" onclick="setFilter('${k}')">${l}</button>`).join('')}
    </div>
    <div class="content">${renderMatchesTab()}</div>` : renderLeaderboardTab() + renderAdminPanel()}
    ${renderAuthModal()}
  `;
  window.scrollTo(0, state.tab==='matches' ? scrollY : 0);
}

init();
</script>
</body>
</html>
